[project]
name = "m2la-contracts"
version = "0.1.0"
description = "Shared contracts and schemas for MuleSoft to Logic Apps migration platform"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.0",
]

[dependency-groups]
dev = [
    "ruff",
    "pytest",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
generate-schemas = "m2la_contracts.scripts.generate_schemas:main"

[tool.hatch.build.targets.wheel]
packages = ["src/m2la_contracts"]

[tool.ruff]
target-version = "py313"
line-length = 120
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
