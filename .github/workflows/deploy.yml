# ---------------------------------------------------------------------------
# Deployment Workflow
#
# Deploys infrastructure and application to Azure.
# Triggered on push to main or manual dispatch with environment selection.
#
# Flow:
#   1. Deploy Bicep infrastructure
#   2. Build and push API container image to ACR
#   3. Deploy Container App revision
#   4. Build CLI package (artifact only)
# ---------------------------------------------------------------------------
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # Required for OIDC Azure login
  packages: write  # Required for container image push

# ---------------------------------------------------------------------------
# Determine the target environment
# ---------------------------------------------------------------------------
env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  # ===========================================================================
  # 1. Deploy Infrastructure (Bicep)
  # ===========================================================================
  infra:
    name: "Deploy Infrastructure (${{ github.event.inputs.environment || 'dev' }})"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      acr-login-server: ${{ steps.deploy.outputs.acrLoginServer }}
      container-app-name: ${{ steps.deploy.outputs.containerAppName }}
      resource-group: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az deployment group validate \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP_NAME }}" \
              --template-file infra/bicep/main.bicep \
              --parameters infra/bicep/parameters/${{ env.ENVIRONMENT }}.bicepparam

      - name: Deploy Bicep
        id: deploy
        uses: azure/CLI@v2
        with:
          inlineScript: |
            RESULT=$(az deployment group create \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP_NAME }}" \
              --template-file infra/bicep/main.bicep \
              --parameters infra/bicep/parameters/${{ env.ENVIRONMENT }}.bicepparam \
              --query 'properties.outputs' \
              --output json)

            echo "acrLoginServer=$(echo "$RESULT" | jq -r '.acrLoginServer.value')" >> "$GITHUB_OUTPUT"
            echo "containerAppName=$(echo "$RESULT" | jq -r '.containerAppName.value')" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # 2. Build and Push API Container Image
  # ===========================================================================
  build-api:
    name: "Build & Push API Image"
    runs-on: ubuntu-latest
    needs: infra
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az acr login --name "${{ needs.infra.outputs.acr-login-server }}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.infra.outputs.acr-login-server }}/m2la-api
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ===========================================================================
  # 3. Deploy to Container Apps
  # ===========================================================================
  deploy-app:
    name: "Deploy to Container Apps"
    runs-on: ubuntu-latest
    needs: [infra, build-api]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy new revision
        uses: azure/CLI@v2
        with:
          inlineScript: |
            # Get the SHA-based image tag
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            IMAGE="${{ needs.infra.outputs.acr-login-server }}/m2la-api:sha-${SHORT_SHA}"

            az containerapp update \
              --name "${{ needs.infra.outputs.container-app-name }}" \
              --resource-group "${{ needs.infra.outputs.resource-group }}" \
              --image "$IMAGE"

      - name: Verify deployment
        uses: azure/CLI@v2
        with:
          inlineScript: |
            # Wait for the new revision to become active
            sleep 15

            FQDN=$(az containerapp show \
              --name "${{ needs.infra.outputs.container-app-name }}" \
              --resource-group "${{ needs.infra.outputs.resource-group }}" \
              --query 'properties.configuration.ingress.fqdn' \
              --output tsv)

            echo "Checking health at https://${FQDN}/health ..."
            curl -sf "https://${FQDN}/health" || echo "::warning::Health check did not pass yet. The app may still be starting."

  # ===========================================================================
  # 4. Build CLI Package (artifact only — publish is a future step)
  # ===========================================================================
  build-cli:
    name: "Build CLI Package"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/cli/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/cli

      - name: Build
        run: npm run build
        working-directory: apps/cli

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: mule2logic-cli
          path: apps/cli/dist/
          retention-days: 14
