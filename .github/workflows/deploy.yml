# ---------------------------------------------------------------------------
# Deployment Workflow
# ---------------------------------------------------------------------------
# Deploys infrastructure (Bicep) and application (Container App) to Azure.
# Uses OIDC federated identity — no stored secrets for Azure auth.
#
# Pipeline:
#   1. deploy-infra  — Bicep deploys environment, registry, identity, monitoring
#   2. build-push    — Build container image and push to ACR
#   3. deploy-app    — Deploy Container App via script (create or update)
#
# Triggers:
#   - Push to main (auto-deploy to dev)
#   - Manual dispatch with environment selector
# ---------------------------------------------------------------------------

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
        default: dev

permissions:
  id-token: write # Required for OIDC federated credentials
  contents: read

env:
  # Default to dev for push-triggered runs
  DEPLOY_ENV: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Deploy Infrastructure (Bicep)
  # -----------------------------------------------------------------------
  deploy-infra:
    name: Deploy Infrastructure (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      acr-login-server: ${{ steps.deploy.outputs.acrLoginServer }}
      acr-name: ${{ steps.deploy.outputs.acrName }}
      cae-name: ${{ steps.deploy.outputs.containerAppsEnvironmentName }}
      uami-resource-id: ${{ steps.deploy.outputs.uamiResourceId }}
      uami-client-id: ${{ steps.deploy.outputs.uamiClientId }}
      app-insights-conn-string: ${{ steps.deploy.outputs.appInsightsConnectionString }}
      resource-group: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}
          template: infra/bicep/main.bicep
          parameters: >-
            infra/bicep/main.${{ env.DEPLOY_ENV }}.bicepparam
          deploymentName: m2la-${{ env.DEPLOY_ENV }}-${{ github.run_number }}
          failOnStdErr: false

  # -----------------------------------------------------------------------
  # Job 2: Build and Push Container Image to ACR
  # -----------------------------------------------------------------------
  build-push-image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Compute image tag
        id: meta
        run: |
          TAG="${{ github.sha }}"
          echo "tag=${TAG:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build & push with ACR
        run: |
          az acr build \
            --registry ${{ needs.deploy-infra.outputs.acr-name }} \
            --image m2la-api:${{ steps.meta.outputs.tag }} \
            --image m2la-api:latest \
            --file apps/api/Dockerfile \
            .

  # -----------------------------------------------------------------------
  # Job 3: Deploy Container App via script
  # -----------------------------------------------------------------------
  deploy-app:
    name: Deploy Container App (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: [deploy-infra, build-push-image]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Container App
        env:
          RESOURCE_GROUP: ${{ needs.deploy-infra.outputs.resource-group }}
          ENVIRONMENT_NAME: ${{ env.DEPLOY_ENV }}
          ACR_LOGIN_SERVER: ${{ needs.deploy-infra.outputs.acr-login-server }}
          IMAGE_TAG: ${{ needs.build-push-image.outputs.image-tag }}
          UAMI_RESOURCE_ID: ${{ needs.deploy-infra.outputs.uami-resource-id }}
          UAMI_CLIENT_ID: ${{ needs.deploy-infra.outputs.uami-client-id }}
          APP_INSIGHTS_CONN_STRING: ${{ needs.deploy-infra.outputs.app-insights-conn-string }}
          CAE_NAME: ${{ needs.deploy-infra.outputs.cae-name }}
        run: |
          chmod +x infra/scripts/deploy-container-app.sh
          ./infra/scripts/deploy-container-app.sh
