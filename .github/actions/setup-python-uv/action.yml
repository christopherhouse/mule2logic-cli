name: Setup Python with uv
description: Installs Python 3.13 and uv, then syncs dependencies for a project directory.

inputs:
  working-directory:
    description: Path to the Python project directory (containing pyproject.toml).
    required: true
  python-version:
    description: Python version to install.
    required: false
    default: "3.13"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Sync dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: uv sync
